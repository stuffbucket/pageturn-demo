<?xml version="1.0" encoding="UTF-8"?>
<!--
  bend-binding-tangent-regimes.svg — companion diagram for
  docs/prd-page-model.md, section "Bend-binding-tangent constraint".

  Two scenarios shown side-by-side, both in the (x, y) page plane viewed
  from above (the spine runs vertically at x=0; the binding endpoints are
  the small filled circles at top-left and bottom-left of each page).

    Left:  Regime I — tight curl (small R). The bend's spine footprint
           stays inside [-H/2, +H/2]. anchorY is honored.
    Right: Regime II — loose curl (large R). The bend's footprint reaches
           past +H/2; the crease anchor migrates to the top binding
           corner. Further turning is rotation around that corner.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="sans-serif" font-size="11">
  <style>
    .spine { stroke: #222; stroke-width: 2.5; }
    .page  { fill: #f7f3ea; stroke: #888; stroke-width: 1; }
    .crease { stroke: #2266dd; stroke-width: 1.5; stroke-dasharray: 4 3; fill: none; }
    .bend  { fill: rgba(34, 102, 221, 0.18); stroke: #2266dd; stroke-width: 1.2; }
    .bendII { fill: rgba(221, 68, 34, 0.20); stroke: #dd4422; stroke-width: 1.4; }
    .anchor { fill: #2266dd; }
    .anchorII { fill: #dd4422; }
    .corner { fill: #222; }
    .label { fill: #222; font-size: 11px; }
    .title { fill: #222; font-size: 13px; font-weight: bold; }
    .annot { fill: #555; font-size: 10px; font-style: italic; }
    .tangent-x { stroke: #dd4422; stroke-width: 2; }
  </style>

  <!-- ====== Regime I (left panel) ====== -->
  <g transform="translate(20, 20)">
    <text class="title" x="160" y="0" text-anchor="middle">Regime I — free (tight curl, small R)</text>

    <!-- page rectangle -->
    <rect class="page" x="80" y="20" width="200" height="260"/>

    <!-- spine -->
    <line class="spine" x1="80" y1="20" x2="80" y2="280"/>

    <!-- binding endpoint dots -->
    <circle class="corner" cx="80" cy="20"  r="4"/>
    <circle class="corner" cx="80" cy="280" r="4"/>
    <text class="label" x="68" y="20"  text-anchor="end">+H/2</text>
    <text class="label" x="68" y="284" text-anchor="end">−H/2</text>

    <!-- crease line: from (0, anchorY≈+25 from center) at tilt θ<0 (toward top-right) -->
    <line class="crease" x1="80" y1="125" x2="290" y2="60"/>
    <circle class="anchor" cx="80" cy="125" r="4"/>
    <text class="label" x="68" y="128" text-anchor="end">anchorY</text>

    <!-- bend (cylindrical curl arc projected onto page plane) -->
    <path class="bend" d="
      M 220 80
      Q 200 95, 165 110
      Q 140 122, 130 130
      L 180 60
      Q 200 70, 220 80
      Z"/>
    <text class="annot" x="170" y="103">bend footprint</text>
    <text class="annot" x="170" y="116">(stays in [−H/2, +H/2])</text>

    <!-- ΔY_max annotation -->
    <text class="label" x="160" y="295" text-anchor="middle">R·sin(φ)·|sin θ|  &lt;  H/2 − anchorY</text>
  </g>

  <!-- ====== Regime II (right panel) ====== -->
  <g transform="translate(380, 20)">
    <text class="title" x="160" y="0" text-anchor="middle">Regime II — tangent-top (loose curl, large R)</text>

    <!-- page rectangle -->
    <rect class="page" x="80" y="20" width="200" height="260"/>

    <!-- spine -->
    <line class="spine" x1="80" y1="20" x2="80" y2="280"/>

    <!-- binding endpoint dots -->
    <circle class="corner" cx="80" cy="20"  r="4"/>
    <circle class="corner" cx="80" cy="280" r="4"/>
    <text class="label" x="68" y="20"  text-anchor="end">+H/2</text>
    <text class="label" x="68" y="284" text-anchor="end">−H/2</text>

    <!-- crease line MIGRATED: passes through (0, +H/2) -->
    <line class="crease" x1="80" y1="20" x2="290" y2="130"/>

    <!-- old (would-be) anchor shown faded for reference -->
    <circle cx="80" cy="125" r="4" fill="#bbb"/>
    <text class="annot" x="68" y="128" text-anchor="end">old anchorY</text>

    <!-- migrated anchor at top binding endpoint -->
    <circle class="anchorII" cx="80" cy="20" r="5"/>

    <!-- bend (larger, would-be footprint extending past +H/2) -->
    <path class="bendII" d="
      M 230 70
      Q 195 50, 150 30
      Q 110 18, 90 10
      L 90 0
      Q 150 5, 200 25
      Q 230 45, 230 70
      Z"/>

    <!-- tangent point marker -->
    <line class="tangent-x" x1="74" y1="14"  x2="86" y2="26"/>
    <line class="tangent-x" x1="74" y1="26"  x2="86" y2="14"/>
    <text class="annot" x="100" y="14">tangent point</text>

    <!-- arc-around-corner annotation -->
    <path d="M 80 20 A 35 35 0 0 1 115 55" fill="none" stroke="#dd4422" stroke-width="1.2" stroke-dasharray="2 2"/>
    <text class="annot" x="120" y="58">cursor DOF reduced</text>
    <text class="annot" x="120" y="70">to rotation around corner</text>

    <text class="label" x="160" y="295" text-anchor="middle">R·sin(φ)·|sin θ|  ≥  H/2 − anchorY</text>
  </g>
</svg>
